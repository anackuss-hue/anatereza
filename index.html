<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f7f6f3;color:#1a1a1a;font-size:14px;overflow:hidden;height:100vh}
button{font-family:'DM Sans',sans-serif;cursor:pointer}
input,select,textarea{font-family:'DM Sans',sans-serif}
.serif{font-family:'Playfair Display',serif}
.app{display:flex;height:100vh;overflow:hidden}

.sidebar{width:230px;background:#fff;border-right:.5px solid #e8e8e4;display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:22px 20px 18px;border-bottom:.5px solid #f0f0ec}
.logo-main{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#1a1a1a}
.logo-sub-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#8b7355;line-height:1}
.logo-tag{font-size:10px;color:#bbb;margin-top:6px;letter-spacing:.08em;text-transform:uppercase}
.nav{padding:12px 10px;flex:1;overflow-y:auto}
.nav-label{font-size:10px;color:#ccc;text-transform:uppercase;letter-spacing:.08em;padding:0 8px;margin:14px 0 4px}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border-radius:10px;border:none;background:transparent;color:#888;font-size:13px;font-weight:400;text-align:left;transition:all .15s;margin-bottom:2px}
.nav-btn:hover{background:#f7f6f3;color:#1a1a1a}
.nav-btn.active{background:#f7f6f3;color:#1a1a1a;font-weight:600}
.nav-count{margin-left:auto;font-size:11px;background:#f5f5f3;border-radius:10px;padding:1px 8px;color:#aaa}
.nav-btn.active .nav-count{background:#e8e8e4}
.user-area{padding:14px 16px;border-top:.5px solid #f0f0ec}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#d4a853,#8b5e3c);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:.5px solid #e8e8e4;padding:14px 28px;display:flex;align-items:center;gap:16px}
.topbar h1{font-size:16px;font-weight:700;font-family:'Playfair Display',serif;flex:1}
.search-wrap{position:relative}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:#aaa;pointer-events:none}
.search-input{padding-left:34px;padding-right:12px;height:34px;border-radius:8px;border:.5px solid #e8e8e4;font-size:13px;outline:none;width:200px;background:#fafaf8}
.filterbar{background:#fff;border-bottom:.5px solid #e8e8e4;padding:10px 28px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filter-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:.5px solid #e8e8e4;background:transparent;color:#666;transition:all .15s}
.filter-btn:hover{border-color:#888}
.filter-btn.active-dark{border:1.5px solid #1a1a1a;background:#1a1a1a;color:#fff;font-weight:600}
.filter-btn.active-gold{border:1.5px solid #8b7355;background:#8b7355;color:#fff;font-weight:600}
.divider{width:1px;height:20px;background:#eee;margin:0 6px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:24px 28px}

.stat-grid{display:grid;gap:14px;margin-bottom:24px}
.g4{grid-template-columns:repeat(4,1fr)}
.g5{grid-template-columns:repeat(5,1fr)}
.stat-card{background:#fff;border-radius:14px;border:.5px solid #e8e8e4;padding:16px 18px}
.stat-label{font-size:11px;color:#aaa;margin-bottom:6px}
.stat-val{font-size:28px;font-weight:700;font-family:'Playfair Display',serif;line-height:1}
.stat-sub{font-size:11px;color:#bbb;margin-top:6px}

.table-card{background:#fff;border-radius:14px;border:.5px solid #e8e8e4;overflow:hidden;margin-bottom:20px}
.table-header{padding:14px 18px;border-bottom:.5px solid #eee;font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;color:#aaa;font-weight:600;text-align:left;padding:10px 16px;border-bottom:.5px solid #eee;background:#fafaf8;white-space:nowrap}
.tbl td{padding:12px 16px;border-bottom:.5px solid #f5f5f3;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:#fafaf8}
.tbl tbody tr{cursor:pointer;transition:background .15s}
.tbl-scroll{overflow-x:auto}

.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.b-green{background:#e6f4ea;color:#1e7e34}
.b-amber{background:#fff3cd;color:#856404}
.b-red{background:#fde8e8;color:#a81a1a}
.b-blue{background:#e8f0fd;color:#1a4fa8}
.b-purple{background:#f5e8fd;color:#6f1aa8}
.b-teal{background:#e8f4ea;color:#1a6f4a}
.b-gray{background:#f0f0ec;color:#666}
.b-sm{font-size:10px;padding:2px 8px}

.planner-chip{display:flex;align-items:center;gap:6px}
.planner-dot{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;letter-spacing:.03em;flex-shrink:0}

.prog-wrap{display:flex;align-items:center;gap:6px}
.prog-bar{height:4px;background:#f0f0f0;border-radius:4px;overflow:hidden;width:70px}
.prog-fill{height:100%;border-radius:4px}

.date-box{width:44px;height:44px;border-radius:10px;background:#f7f6f3;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.date-day{font-size:16px;font-weight:700;line-height:1;font-family:'Playfair Display',serif}
.date-mon{font-size:9px;color:#aaa;text-transform:uppercase}

.expand-row{cursor:pointer;transition:background .15s}
.expand-row:hover{background:#fafaf8}
.expand-detail{background:#fafaf8;border-top:.5px solid #f0f0ec;padding:14px 18px 16px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.detail-label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}

.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.upcoming-item{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:.5px solid #f5f5f3}
.upcoming-item:last-child{border-bottom:none}
.planner-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.planner-bar-wrap{flex:1;height:6px;background:#f0f0f0;border-radius:4px;overflow:hidden}
.planner-bar-fill{height:100%;border-radius:4px}
.destino-chips{padding:18px;display:flex;gap:12px;flex-wrap:wrap}
.destino-chip{background:#fafaf8;border-radius:12px;border:.5px solid #eee;padding:12px 18px;text-align:center}

.urgente-card{background:#fff;border-radius:14px;border:1.5px solid #fde8e8;overflow:hidden}
.urgente-row{display:flex;gap:14px;padding:14px 18px;border-bottom:.5px solid #f5f5f3;align-items:flex-start}
.urgente-row:last-child{border-bottom:none}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:20px;width:100%;max-width:680px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:20px 24px;border-bottom:.5px solid #eee;display:flex;align-items:center;gap:12px}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;flex:1}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:#f5f5f3;display:flex;align-items:center;justify-content:center;font-size:16px;color:#666;cursor:pointer}
.modal-close:hover{background:#eee}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:.5px solid #eee;display:flex;gap:10px;justify-content:flex-end}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em}
.form-input{height:38px;border-radius:8px;border:.5px solid #e8e8e4;padding:0 12px;font-size:13px;outline:none;background:#fafaf8;transition:border .15s}
.form-input:focus{border-color:#8b7355;background:#fff}
.form-select{height:38px;border-radius:8px;border:.5px solid #e8e8e4;padding:0 12px;font-size:13px;outline:none;background:#fafaf8;appearance:none;cursor:pointer}
.form-select:focus{border-color:#8b7355}
.form-textarea{border-radius:8px;border:.5px solid #e8e8e4;padding:10px 12px;font-size:13px;outline:none;background:#fafaf8;resize:vertical;min-height:70px;transition:border .15s}
.form-textarea:focus{border-color:#8b7355;background:#fff}
.form-section{font-size:12px;font-weight:600;color:#8b7355;margin:18px 0 12px;padding-bottom:6px;border-bottom:.5px solid #f0f0ec;grid-column:1/-1}

.btn-cancel{background:transparent;color:#888;border:.5px solid #e8e8e4;border-radius:10px;padding:10px 20px;font-size:13px;cursor:pointer}
.btn-cancel:hover{background:#f5f5f3}
.btn-delete{background:#fde8e8;color:#a81a1a;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;margin-right:auto}
.btn-delete:hover{background:#f5d0d0}

.hidden{display:none}
.flex{display:flex}
.flex-center{display:flex;align-items:center}
.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.flex1{flex:1}.fw6{font-weight:600}.fw7{font-weight:700}
.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}
.muted{color:#888}.lighter{color:#aaa}
.ellipsis{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}

</head>

</div>

function parseDate(s){if(!s||!s.includes("/"))return null;const p=s.split("/");return new Date(`${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`);}
function diasRestantes(s){const d=parseDate(s);if(!d)return null;return Math.ceil((d-new Date())/86400000);}
function fmtDias(s){const d=diasRestantes(s);if(d===null)return'';const cor=d<0?"#6f1aa8":d<30?"#a81a1a":d<90?"#856404":"#1a6f4a";const bg=d<0?"#f5e8fd":d<30?"#fde8e8":d<90?"#fff3cd":"#e8f4ea";const label=d<0?"Realizado":d===0?"Hoje!":d+"d";return`<span class="badge b-sm" style="background:${bg};color:${cor}">${label}</span>`;}
function plannerDot(name,size=24){const p=PLANNERS[name]||{color:"#f0f0f0",text:"#666",initials:(name||"?").slice(0,2).toUpperCase()};return`<div class="planner-chip"><div class="planner-dot" style="width:${size}px;height:${size}px;background:${p.color};color:${p.text};font-size:${size<=24?9:11}px">${p.initials}</div><span class="f12 muted">${name||"—"}</span></div>`;}
function statusBadge(s){const m={finalizado:{l:"Finalizado",c:"b-green"},"em-andamento":{l:"Em andamento",c:"b-amber"},urgente:{l:"Urgente",c:"b-red"},planejamento:{l:"Planejamento",c:"b-blue"},distrato:{l:"Distrato",c:"b-purple"}};const x=m[s]||m["em-andamento"];return`<span class="badge ${x.c}">${x.l}</span>`;}
function progBar(s){const pct={finalizado:100,"em-andamento":55,urgente:40,planejamento:20,distrato:15}[s]||50;const col={finalizado:"#1e7e34","em-andamento":"#856404",urgente:"#a81a1a",planejamento:"#1a4fa8",distrato:"#6f1aa8"}[s]||"#856404";return`<div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div><span class="f11 lighter">${pct}%</span></div>`;}
function dateBox(data,urgente=false){if(!data||!data.includes("/")){return`<div class="date-box" style="background:${urgente?"#fde8e8":"#f7f6f3"}"><span class="f11 lighter">${data||"—"}</span></div>`;}const p=data.split("/");return`<div class="date-box" style="background:${urgente?"#fde8e8":"#f7f6f3"}"><div class="date-day" style="color:${urgente?"#a81a1a":"inherit"}">${p[0]}</div><div class="date-mon">${MESES[parseInt(p[1])]||p[1]}</div></div>`;}
function fornPills(list,max=4){if(!list||list.length===0)return`<span class="badge b-sm b-red">sem fornecedores</span>`;let h=list.slice(0,max).map(f=>`<span class="badge b-sm b-gray">${f}</span>`).join("");if(list.length>max)h+=`<span class="badge b-sm" style="background:#e8e8e4;color:#888">+${list.length-max}</span>`;return`<div style="display:flex;flex-wrap:wrap;gap:3px">${h}</div>`;}
function getSearch(){return document.getElementById("search-input")?.value.toLowerCase()||"";}
function applyFilter(list){const s=getSearch();return list.filter(c=>{if(statusFilter!=="todos"&&c.status!==statusFilter)return false;if(destinoFilter!=="todos"&&!(c.destino||"").includes(destinoFilter))return false;if(s&&!(c.casal||"").toLowerCase().includes(s)&&!(c.local||"").toLowerCase().includes(s))return false;return true;});}
const hasAssessor=c=>c.assessor&&!["n/a","a definir","A DEFINIR","N/A","N/D","—",""].includes(c.assessor);

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(item, dataset) {
  editingItem = JSON.parse(JSON.stringify(item)); // deep clone
  editingDataset = dataset;
  document.getElementById("modal-title").textContent = item.casal || "Editar";
  document.getElementById("modal-body").innerHTML = buildForm(item, dataset);
  document.getElementById("modal-overlay").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.add("hidden");
  editingItem = null;
  editingDataset = null;
}

function handleOverlayClick(e) {
  if(e.target === document.getElementById("modal-overlay")) closeModal();
}

    return `<div class="form-grid">
      <div class="form-group full"><div class="form-label">Nome do casal</div><input class="form-input" id="f-casal" value="${item.casal||''}"/></div>
      <div class="form-group"><div class="form-label">Destino</div><input class="form-input" id="f-destino" value="${item.destino||''}"/></div>
      <div class="form-group"><div class="form-label">Convidados</div><input class="form-input" type="number" id="f-convidados" value="${item.convidados||0}"/></div>
      <div class="form-group"><div class="form-label">Responsável</div><select class="form-select" id="f-responsavel">${plannerOptions.map(p=>`<option value="${p}"${item.responsavel===p?" selected":""}>${p}</option>`).join("")}</select></div>

    </div>`;
  }

  if(isPlan) {
    return `<div class="form-grid">
      <div class="form-group full"><div class="form-label">Nome do casal</div><input class="form-input" id="f-casal" value="${item.casal||''}"/></div>
      <div class="form-group"><div class="form-label">Destino</div><input class="form-input" id="f-destino" value="${item.destino||''}"/></div>
      <div class="form-group"><div class="form-label">Hotel</div><input class="form-input" id="f-hotel" value="${item.hotel||''}"/></div>
      <div class="form-group"><div class="form-label">Data de interesse</div><input class="form-input" id="f-dataInteresse" value="${item.dataInteresse||''}"/></div>
      <div class="form-group"><div class="form-label">Convidados</div><input class="form-input" type="number" id="f-convidados" value="${item.convidados||0}"/></div>
      <div class="form-group"><div class="form-label">Responsável</div><select class="form-select" id="f-responsavel">${plannerOptions.map(p=>`<option value="${p}"${item.responsavel===p?" selected":""}>${p}</option>`).join("")}</select></div>

    </div>`;
  }

  // casamento (c26 ou c27)
  return `<div class="form-grid">
    <div class="form-group full"><div class="form-label">Nome do casal</div><input class="form-input" id="f-casal" value="${item.casal||''}"/></div>
    <div class="form-group"><div class="form-label">Local / Hotel</div><input class="form-input" id="f-local" value="${item.local||''}"/></div>
    <div class="form-group"><div class="form-label">Destino</div>
      <select class="form-select" id="f-destino">${destinoOptions.map(d=>`<option value="${d}"${item.destino===d?" selected":""}>${destFlag(d)} ${d}</option>`).join("")}</select>

    <div class="form-section">Fornecedores <span style="font-weight:400;color:#aaa">(um por linha)</span></div>

function saveItem() {
  const ds = editingDataset;
  const id = editingItem.id;

  const g = id => { const el=document.getElementById(id); return el?el.value.trim():""; };

  if(ds === 'distrato') {
    const idx = DISTRATOS.findIndex(x=>x.id===id);
    if(idx===-1) return;
    DISTRATOS[idx] = {...DISTRATOS[idx], casal:g("f-casal"), destino:g("f-destino"), convidados:parseInt(g("f-convidados"))||0, responsavel:g("f-responsavel"), andamento:g("f-andamento")};
  } else if(ds === 'plan') {
    const idx = PLAN.findIndex(x=>x.id===id);
    if(idx===-1) return;
    PLAN[idx] = {...PLAN[idx], casal:g("f-casal"), destino:g("f-destino"), hotel:g("f-hotel"), dataInteresse:g("f-dataInteresse"), convidados:parseInt(g("f-convidados"))||0, responsavel:g("f-responsavel"), status:g("f-status"), andamento:g("f-andamento")};
  } else {
    const arr = ds==='c26'?C26:C27;
    const idx = arr.findIndex(x=>x.id===id);
    if(idx===-1) return;
    arr[idx] = {...arr[idx],
      casal:g("f-casal"), local:g("f-local"), destino:g("f-destino"), data:g("f-data"),
      convidados:parseInt(g("f-convidados"))||0, produtora:g("f-produtora"), assessor:g("f-assessor"),
      status:g("f-status"), andamento:g("f-andamento"),
      fornecedores:g("f-fornecedores").split("\n").map(x=>x.trim()).filter(Boolean),
      eventos:g("f-eventos").split("\n").map(x=>x.trim()).filter(Boolean),
    };
  }
  updateCounts();
  closeModal();
  render();
}

function deleteItem() {
  if(!confirm(`Excluir "${editingItem.casal}"? Esta ação não pode ser desfeita.`)) return;
  const ds = editingDataset;
  const id = editingItem.id;
  if(ds==='distrato') DISTRATOS = DISTRATOS.filter(x=>x.id!==id);
  else if(ds==='plan') PLAN = PLAN.filter(x=>x.id!==id);
  else if(ds==='c26') C26 = C26.filter(x=>x.id!==id);
  else C27 = C27.filter(x=>x.id!==id);
  updateCounts();
  closeModal();
  render();
}

            ${dateBox(c.data)}
            <div style="flex:1;min-width:0">
              <div class="f13 fw6 flex-center gap8">${c.casal} ${fmtDias(c.data)}</div>
              <div class="f11 lighter">${destFlag(c.destino)} ${c.destino} · ${c.local}${c.convidados>0?" · "+c.convidados+" convidados":""}</div>
            </div>
            <div style="font-size:11px;color:#aaa;text-align:center;min-width:100px">
              <div style="font-size:10px;color:#ccc;margin-bottom:2px">Assessor local</div>
              <div style="font-weight:500;color:${hasAssessor(c)?"#1a1a1a":"#ccc"}">${c.assessor||"—"}</div>
            </div>
            ${fornPills(c.fornecedores)}
            ${statusBadge(c.status)}
            <button onclick="event.stopPropagation();openModal(${JSON.stringify(c).replace(/"/g,'&quot;')},'${cds}')" style="background:#f5f5f3;border:none;border-radius:8px;padding:5px 10px;font-size:11px;color:#888;cursor:pointer;flex-shrink:0"><i class="ti ti-pencil"></i></button>
            <i class="ti ti-chevron-${isExp?"up":"down"}" style="font-size:14px;color:#ccc;flex-shrink:0"></i>
          </div>
          ${isExp?`<div class="expand-detail">
            <div class="detail-grid">
              <div><div class="detail-label">Em andamento</div><div class="f13" style="line-height:1.5">${c.andamento||"—"}</div></div>
              <div><div class="detail-label">Eventos programados</div>${c.eventos&&c.eventos.length>0?c.eventos.map(e=>`<div class="f12 muted" style="margin-bottom:4px"><span style="color:#8b7355">•</span> ${e}</div>`).join(""):`<div class="f12 lighter">Nenhum evento registrado</div>`}</div>
              <div><div class="detail-label">Fornecedores contratados</div>${c.fornecedores&&c.fornecedores.length>0?`<div style="display:flex;flex-wrap:wrap;gap:4px">${c.fornecedores.map(f=>`<span class="badge b-sm b-teal">${f}</span>`).join("")}</div>`:`<div class="f12" style="color:#a81a1a">⚠ Nenhum fornecedor cadastrado</div>`}</div>
            </div>
          </div>`:""}
        </div>`;
      });
      html+=`</div></div>`;
    });
  } else if(groupBy==="lista"){
    html+=`<div class="table-card"><div class="tbl-scroll"><table class="tbl">
      <thead><tr><th>Data</th><th>Casal</th><th>Destino / Local</th><th>Produtora</th><th>Assessor</th><th>Fornecedores</th><th>Status</th><th>Em andamento</th></tr></thead>
      <tbody>${filtered.map(c=>{const cds=c.id>=100?'c27':'c26';return`<tr onclick="openModal(${JSON.stringify(c).replace(/"/g,'&quot;')},'${cds}')">
        <td class="f12 muted" style="white-space:nowrap">${c.data}<br>${fmtDias(c.data)}</td>
        <td><div class="f13 fw6">${c.casal}</div>${c.convidados>0?`<div class="f11 lighter">${c.convidados} conv.</div>`:""}</td>
        <td><span class="f12 muted">${destFlag(c.destino)} ${c.destino}</span><div class="f11 lighter">${c.local}</div></td>
        <td>${plannerDot(c.produtora)}</td>
        <td class="f12" style="color:${hasAssessor(c)?"#1a1a1a":"#ccc"}">${c.assessor||"—"}</td>
        <td>${fornPills(c.fornecedores,3)}</td>
        <td>${statusBadge(c.status)}</td>
        <td class="f11 muted" style="max-width:180px"><div class="ellipsis">${c.andamento||""}</div></td>
      </tr>`;}).join("")}</tbody>
    </table></div></div>`;
  } else {
    if(urgentes.length>0){
      html+=`<div style="margin-bottom:24px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span class="f13 fw7" style="color:#a81a1a">🚨 Urgentes</span><span class="badge b-sm b-red">${urgentes.length}</span></div>
        <div class="urgente-card">${urgentes.map((c,idx)=>{const cds=c.id>=100?'c27':'c26';return`<div class="urgente-row" style="border-bottom:${idx<urgentes.length-1?".5px solid #f5f5f3":"none"};cursor:pointer" onclick="openModal(${JSON.stringify(c).replace(/"/g,'&quot;')},'${cds}')">
          ${dateBox(c.data,true)}
          <div style="flex:1"><div class="f13 fw7 mb4">${c.casal}</div><div class="f11 lighter mb8">${destFlag(c.destino)} ${c.destino} · ${c.local}</div><div class="f12 fw6" style="color:#a81a1a">⚠ ${c.andamento}</div></div>
          ${plannerDot(c.produtora)}
        </div>`;}).join("")}</div>
      </div>`;
    }
    html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span class="f13 fw7 muted">Em andamento</span><span class="badge b-sm b-amber">${emAndamento.length}</span></div>
    <div class="table-card" style="margin-bottom:0">${emAndamento.map((c,idx)=>{const cds=c.id>=100?'c27':'c26';return`<div style="display:flex;gap:14px;padding:13px 18px;border-bottom:${idx<emAndamento.length-1?".5px solid #f5f5f3":"none"};align-items:center;cursor:pointer" onclick="openModal(${JSON.stringify(c).replace(/"/g,'&quot;')},'${cds}')">
      ${dateBox(c.data)}<div style="flex:1;min-width:0"><div class="f13 fw6">${c.casal}</div><div class="f11 lighter">${destFlag(c.destino)} ${c.destino} · ${c.local}</div></div>
      <div class="f11 muted ellipsis" style="max-width:200px">${c.andamento||""}</div>${plannerDot(c.produtora)}${statusBadge(c.status)}
    </div>`;}).join("")}</div>`;
  }
  return html;
}

// ─── CONTROLLER ──────────────────────────────────────────────────────────────
const TITLES={dashboard:"Visão geral","casamentos-2026":"Casamentos 2026","casamentos-2027":"Casamentos 2027",planejamento:"Planejamento & Distratos",producao:"Produção"};

function render(){
  const el=document.getElementById("content");
  if(currentView==="dashboard") el.innerHTML=renderDashboard();
  else if(currentView==="casamentos-2026") el.innerHTML=renderCasamentos(C26,2026,'c26');
  else if(currentView==="casamentos-2027") el.innerHTML=renderCasamentos(C27,2027,'c27');
  else if(currentView==="planejamento") el.innerHTML=renderPlanejamento();
  else if(currentView==="producao") el.innerHTML=renderProducao();
}

function setView(v, btn){
  currentView=v; statusFilter='todos'; destinoFilter='todos'; expandedId=null;
  document.getElementById("page-title").textContent=TITLES[v];
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  const hasFilt=v!=="dashboard";
  document.getElementById("filterbar").classList.toggle("hidden",!hasFilt);
  document.getElementById("search-area").classList.toggle("hidden",!hasFilt);
  if(document.getElementById("search-input")) document.getElementById("search-input").value="";
  document.querySelectorAll("[onclick*='setStatusFilter']").forEach(b=>{b.classList.remove("active-dark");if(b.textContent==="Todos")b.classList.add("active-dark");});
  document.querySelectorAll("[onclick*='setDestinoFilter']").forEach(b=>{b.classList.remove("active-gold");if(b.textContent==="Todos")b.classList.add("active-gold");});
  render();
}

function setStatusFilter(btn,val){
  statusFilter=val;
  document.querySelectorAll("[onclick*='setStatusFilter']").forEach(b=>b.classList.remove("active-dark"));
  btn.classList.add("active-dark");
  render();
}

function setDestinoFilter(btn,val){
  destinoFilter=val;
  document.querySelectorAll("[onclick*='setDestinoFilter']").forEach(b=>b.classList.remove("active-gold"));
  btn.classList.add("active-gold");
  render();
}

function setGroupBy(g){ groupBy=g; render(); }

function handleProdRow(event, id){
  expandedId=(expandedId===id?null:id);
  render();
}

function updateCounts(){
  document.getElementById("cnt-2026").textContent=C26.length;
  document.getElementById("cnt-2027").textContent=C27.length;
  document.getElementById("cnt-plan").textContent=PLAN.length;
  document.getElementById("cnt-producao").textContent=[...C26,...C27].filter(c=>c.status!=="finalizado").length;
}

// INIT
updateCounts();
render();
</script>
</body>
</html>
